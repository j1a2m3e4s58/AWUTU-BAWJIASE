<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(184, 139, 74, 0.18), transparent 30%),
          radial-gradient(circle at 82% 28%, rgba(67, 86, 82, 0.18), transparent 34%),
          linear-gradient(180deg, #090d14 0%, #101620 48%, #090d14 100%);
        color-scheme: dark;
      }
    </style>
    <script>
      (function () {
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('spa-redirect-path', redirectPath);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
