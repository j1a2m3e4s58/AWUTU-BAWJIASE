<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Awutu" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Awutu Bawjiase Community — Royal Heritage Platform</title>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('theme');
          var useDark = storedTheme ? storedTheme === 'dark' : true;
          if (useDark) document.documentElement.classList.add('dark');
        } catch (error) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html {
        background: #090d14;
        color-scheme: dark;
      }

      html.dark,
      html.dark body {
        background: #090d14;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(184, 139, 74, 0.18), transparent 30%),
          radial-gradient(circle at 82% 28%, rgba(67, 86, 82, 0.18), transparent 34%),
          linear-gradient(180deg, #090d14 0%, #101620 48%, #090d14 100%);
      }

      #root {
        min-height: 100vh;
        background: transparent;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
