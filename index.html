<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Awutu" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Awutu Bawjiase Community — Royal Heritage Platform</title>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('theme');
          var useDark = storedTheme ? storedTheme === 'dark' : true;
          if (useDark) document.documentElement.classList.add('dark');
        } catch (error) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html {
        background: #090d14;
        color-scheme: dark;
      }

      html.dark,
      html.dark body {
        background: #090d14;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(184, 139, 74, 0.18), transparent 30%),
          radial-gradient(circle at 82% 28%, rgba(67, 86, 82, 0.18), transparent 34%),
          linear-gradient(180deg, #090d14 0%, #101620 48%, #090d14 100%);
      }

      #root {
        min-height: 100vh;
        background: transparent;
      }

      .app-first-paint {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 4.5rem 1.5rem;
        box-sizing: border-box;
        font-family: Georgia, 'Times New Roman', serif;
        color: #efe7d8;
      }

      .app-first-paint__brand {
        width: min(100%, 72rem);
        display: flex;
        align-items: center;
        gap: 0.9rem;
        opacity: 0.92;
      }

      .app-first-paint__mark {
        width: 2.8rem;
        height: 2.8rem;
        display: grid;
        place-items: center;
        border: 1px solid rgba(184, 139, 74, 0.34);
        background: rgba(184, 139, 74, 0.12);
        color: #d6ad63;
      }

      .app-first-paint__title {
        margin: 0;
        font-size: clamp(1.1rem, 4vw, 1.5rem);
        line-height: 1.1;
      }

      .app-first-paint__subtitle {
        margin: 0.25rem 0 0;
        font: 0.64rem/1.2 system-ui, sans-serif;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(239, 231, 216, 0.54);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-first-paint" aria-hidden="true">
        <div class="app-first-paint__brand">
          <div class="app-first-paint__mark">A</div>
          <div>
            <p class="app-first-paint__title">Awutu Bawjiase</p>
            <p class="app-first-paint__subtitle">Royal Heritage Platform</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
